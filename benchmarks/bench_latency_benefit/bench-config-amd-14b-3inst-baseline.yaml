kvcached: # kvcached disabled for baseline comparison
  kvcached_gpu_utilization: 0.90
  kvcached_page_prealloc_enabled: false
  kvcached_min_reserved_pages: 5
  kvcached_max_reserved_pages: 20
  kvcached_sanity_check: false
  kvcached_log_level: INFO

router: # router configuration
  enable_router: true
  router_port: 8080
  router_host: localhost

sleep_manager: # sleep configuration
  idle_threshold_seconds: 300
  check_interval_seconds: 60
  auto_sleep_enabled: false
  wakeup_on_request: true
  min_sleep_duration: 10

launch_delay_seconds: 90

instances: # instances configuration
  # With 3x14B on 192GB GPU: ~96GB available for KV after weights (~96GB for 3x14B).
  # --gpu-memory-utilization=0.30 gives ~30GB KV per instance (3x30=90GB total),
  # hard-capping each instance to its static slice.
  - name: instance1
    model: Qwen/Qwen2.5-14B-Instruct
    engine: vllm
    using_venv: false
    kvcached_env: []  # kvcached disabled
    engine_env:
      - "VLLM_USE_V1=1"
      - "VLLM_SERVER_DEV_MODE=1"
    engine_args:
      - "--disable-log-requests"
      - "--no-enable-prefix-caching"
      - "--host=localhost"
      - "--port=12346"
      - "--gpu-memory-utilization=0.30"
      - "--enable-sleep-mode"
      - "--max-model-len=32768"

  - name: instance2
    model: Qwen/Qwen2.5-14B-Instruct
    engine: vllm
    using_venv: false
    kvcached_env: []  # kvcached disabled
    engine_env:
      - "VLLM_USE_V1=1"
      - "VLLM_SERVER_DEV_MODE=1"
    engine_args:
      - "--disable-log-requests"
      - "--no-enable-prefix-caching"
      - "--host=localhost"
      - "--port=30000"
      - "--gpu-memory-utilization=0.30"
      - "--enable-sleep-mode"
      - "--max-model-len=32768"

  - name: instance3
    model: Qwen/Qwen2.5-14B-Instruct
    engine: vllm
    using_venv: false
    kvcached_env: []  # kvcached disabled
    engine_env:
      - "VLLM_USE_V1=1"
      - "VLLM_SERVER_DEV_MODE=1"
    engine_args:
      - "--disable-log-requests"
      - "--no-enable-prefix-caching"
      - "--host=localhost"
      - "--port=40000"
      - "--gpu-memory-utilization=0.30"
      - "--enable-sleep-mode"
      - "--max-model-len=32768"
